  <polyline points="50.0,129.6 73.2,92.7 96.5,55.3 119.7,99.9 142.9,97.0 166.1,97.0 189.4,97.0 212.6,95.9 235.8,95.8 259.0,73.3 282.3,66.3 305.5,74.8 328.7,74.8 351.9,74.8 375.2,81.4 398.4,56.1 421.6,66.7 444.8,70.6 468.1,48.3 491.3,48.3 514.5,48.3 537.7,64.5 561.0,96.7 584.2,85.8 607.4,93.3 630.6,87.8 653.9,87.8 677.1,87.8 700.3,99.8 723.5,119.5 746.8,119.6 770.0,119.6" fill="none" stroke="#f0a500" stroke-width="1.5" opacity="0.85"/>
  <polyline points="50.0,150.7 73.2,121.4 96.5,85.7 119.7,122.3 142.9,119.9 166.1,119.9 189.4,119.9 212.6,119.0 235.8,115.9 259.0,93.3 282.3,88.2 305.5,93.7 328.7,93.7 351.9,93.7 375.2,99.7 398.4,76.0 421.6,82.3 444.8,81.5 468.1,63.3 491.3,63.3 514.5,63.3 537.7,73.1 561.0,97.1 584.2,89.1 607.4,92.4 630.6,85.9 653.9,85.9 677.1,85.9 700.3,92.6 723.5,109.4 746.8,109.5 770.0,109.5" fill="none" stroke="#d29922" stroke-width="2.5"/>

  <!-- 当前趋势方向箭头（不带数字）-->
  <text x="760" y="48" text-anchor="end" fill="#3fb950" font-size="22" font-weight="bold">▲</text>

  <!-- 图例 -->
  <g transform="translate(58, 42)" class="label">
    <line x1="0" y1="0" x2="14" y2="0" stroke="#d29922" stroke-width="2.5"/>
    <text x="20" y="4" fill="#c9d1d9">Total</text>
    <line x1="70" y1="0" x2="84" y2="0" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="90" y="4" fill="#c9d1d9">NDQ.AX</text>
    <line x1="155" y1="0" x2="169" y2="0" stroke="#f0a500" stroke-width="1.5"/>
    <text x="175" y="4" fill="#c9d1d9">Gold</text>
