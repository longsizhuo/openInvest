  <polyline points="50.0,129.6 74.0,92.7 98.0,55.3 122.0,99.9 146.0,97.0 170.0,97.0 194.0,97.0 218.0,95.9 242.0,95.8 266.0,73.3 290.0,66.3 314.0,74.8 338.0,74.8 362.0,74.8 386.0,81.4 410.0,56.1 434.0,66.7 458.0,70.6 482.0,48.3 506.0,48.3 530.0,48.3 554.0,64.5 578.0,96.7 602.0,85.8 626.0,93.3 650.0,87.8 674.0,87.8 698.0,87.8 722.0,99.8 746.0,119.5 770.0,119.6" fill="none" stroke="#f0a500" stroke-width="1.5" opacity="0.85"/>
  <polyline points="50.0,150.7 74.0,121.4 98.0,85.7 122.0,122.3 146.0,119.9 170.0,119.9 194.0,119.9 218.0,119.0 242.0,115.9 266.0,93.3 290.0,88.2 314.0,93.7 338.0,93.7 362.0,93.7 386.0,99.7 410.0,76.0 434.0,82.3 458.0,81.5 482.0,63.3 506.0,63.3 530.0,63.3 554.0,73.1 578.0,97.1 602.0,89.1 626.0,92.4 650.0,85.9 674.0,85.9 698.0,85.9 722.0,92.6 746.0,109.4 770.0,109.5" fill="none" stroke="#d29922" stroke-width="2.5"/>

