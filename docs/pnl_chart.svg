<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-label="PnL trend chart (privacy-preserving, no absolute numbers)">
  <style>
    .label { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
  </style>
  <!-- 背景 -->
  <rect width="800" height="280" fill="#0d1117"/>
  <!-- 0% 基线（虚线灰）-->
  <line x1="50" y1="125.5" x2="770" y2="125.5"
        stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="44" y="129.5" text-anchor="end" fill="#6e7681" class="label">0%</text>
  <!-- y 轴方向标识（不带数字）-->
  <text x="44" y="40" text-anchor="end" fill="#3fb950" class="label">+</text>
  <text x="44" y="248" text-anchor="end" fill="#f85149" class="label">−</text>
  <!-- x 轴标签：相对时间，无具体日期 -->
  <text x="50" y="272" fill="#6e7681" class="label">30 天前</text>
  <text x="770" y="272" text-anchor="end" fill="#6e7681" class="label">今天</text>

